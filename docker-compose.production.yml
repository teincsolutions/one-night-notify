services:
  # Notifications API Service
  api:
    image: notifications:latest
    container_name: notifications-api
    restart: unless-stopped
    command: [ "dumb-init", "node", "dist/main" ]
    environment:
      NODE_ENV: production
      PORT: 3000
      # External database and redis - set via environment variables
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      API_KEY_MASTER: ${API_KEY_MASTER}
      JWT_SECRET: ${JWT_SECRET}
      RATE_LIMIT_POINTS: ${RATE_LIMIT_POINTS:-1000}
      RATE_LIMIT_DURATION: ${RATE_LIMIT_DURATION:-60}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PRISMA_CLI_BINARY_TARGETS: linux-musl-arm64-openssl-1.1.x
    ports:
      - "${API_PORT:-3000}:3000"
    networks:
      - notifications-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # BullMQ Worker Service (same image, different command)
  worker:
    image: notifications:latest
    container_name: notifications-worker
    restart: unless-stopped
    command: [ "dumb-init", "node", "dist/main" ]
    environment:
      NODE_ENV: production
      WORKER_MODE: "true"
      # External database and redis - set via environment variables
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PRISMA_CLI_BINARY_TARGETS: linux-musl-arm64-openssl-1.1.x
    networks:
      - notifications-network
    volumes:
      - ./logs:/app/logs
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  notifications-network:
    driver: bridge
