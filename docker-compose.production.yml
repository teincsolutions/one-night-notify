services:
  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: one-night-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - one-night-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
  # Notifications API Service
  api:
    image: one-night-notify:latest
    container_name: one-night-api
    restart: unless-stopped
    command: [ "dumb-init", "node", "dist/main" ]
    environment:
      NODE_ENV: production
      PORT: 4000
      # External database and redis - set via environment variables
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      API_KEY_MASTER: ${API_KEY_MASTER}
      JWT_SECRET: ${JWT_SECRET}
      RATE_LIMIT_POINTS: ${RATE_LIMIT_POINTS:-1000}
      RATE_LIMIT_DURATION: ${RATE_LIMIT_DURATION:-60}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PRISMA_CLI_BINARY_TARGETS: linux-musl-arm64-openssl-1.1.x
    ports:
      - "${API_PORT:-4000}:4000"
    networks:
      - one-night-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # BullMQ Worker Service (same image, different command)
  worker:
    image: one-night-notify:latest
    restart: unless-stopped
    command: [ "dumb-init", "node", "dist/main" ]
    environment:
      NODE_ENV: production
      WORKER_MODE: "true"
      # External database and redis - set via environment variables
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PRISMA_CLI_BINARY_TARGETS: linux-musl-arm64-openssl-1.1.x
    depends_on:
      - redis
    networks:
      - one-night-network
    volumes:
      - ./logs:/app/logs
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
volumes:
  redis_data:
    driver: local

networks:
  one-night-network:
    driver: bridge
