services:
  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: one-night-redis
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - redis_data:/data
    networks:
      - one-night-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
  # Notifications API Service
  api:
    image: one-night-notify:latest
    container_name: one-night-api
    restart: unless-stopped
    command: [ "dumb-init", "node", "dist/main" ]
    env_file:
      - .env
    ports:
      - "${API_PORT:-4000}:4000"
    networks:
      - one-night-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # BullMQ Worker Service (same image, different command)
  worker:
    image: one-night-notify:latest
    restart: unless-stopped
    command: [ "dumb-init", "node", "dist/main" ]
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - one-night-network
    volumes:
      - ./logs:/app/logs
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
volumes:
  redis_data:
    driver: local

networks:
  one-night-network:
    driver: bridge
