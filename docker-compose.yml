services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: notifications-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - notify-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d notifications" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: notifications-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - notify-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Notifications API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notify-api
    restart: unless-stopped
    command: [ "dumb-init", "node", "dist/main" ]
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:password@db:5432/notifications
      REDIS_URL: redis://redis:6379
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      API_KEY_MASTER: ${API_KEY_MASTER}
      JWT_SECRET: ${JWT_SECRET}
      RATE_LIMIT_POINTS: 100
      RATE_LIMIT_DURATION: 60
      PRISMA_CLI_BINARY_TARGETS: linux-musl-arm64-openssl-3.0.x
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - notify-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # BullMQ Worker Service (same image, different command)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notify-worker
    restart: unless-stopped
    command: [ "dumb-init", "node", "dist/main" ]
    environment:
      NODE_ENV: production
      WORKER_MODE: "true"
      DATABASE_URL: postgresql://postgres:password@db:5432/notifications
      REDIS_URL: redis://redis:6379
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      PRISMA_CLI_BINARY_TARGETS: linux-musl-arm64-openssl-3.0.x
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - notify-network
    volumes:
      - ./logs:/app/logs
    deploy:
      replicas: 1

  # Database Admin Interface (Optional)
  adminer:
    image: adminer:latest
    container_name: notify-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - notify-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  notify-network:
    driver: bridge
