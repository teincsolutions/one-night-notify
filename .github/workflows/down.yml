name: Down

on:
  workflow_dispatch:

jobs:
  down:
    name: Bring down production
    runs-on: [self-hosted, teinc-run-1]
    steps:
      - name: Checkout repository
        run: |
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} 2>/dev/null || true
          git fetch --depth=1 origin ${{ github.sha }}
          git checkout ${{ github.sha }}

      - name: Stop and remove containers
        run: |
          echo "Bringing down production environment..."
          touch .env
          docker compose -f docker-compose.production.yml down
          rm -f .env
          echo "✅ Production environment is down"
